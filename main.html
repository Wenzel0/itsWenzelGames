<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMERAS</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #808080; /* grey background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 4em;
            margin: 0;
        }

        .play-button {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 1.5em;
            background-color: #444;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        .play-button:hover {
            background-color: #666;
        }
    </style>
</head>
<body>
    <h1>CAMERAS</h1>
    <button class="play-button" onclick="window.location.href='Cameras/Act1Demo.html'">
        Play demo
    </button>
</body>
</html>
